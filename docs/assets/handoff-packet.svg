<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Handoff packet preview</title>
  <desc id="desc">A structured agent handoff packet with state, plan, and verification sections.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf7ef"/>
      <stop offset="1" stop-color="#eadfce"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25332e"/>
      <stop offset="1" stop-color="#111714"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="#2f342e" flood-opacity="0.23"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#efe6d8"/>
  <path d="M0 720 C250 650 390 760 620 690 C900 606 1040 520 1600 610 L1600 1000 L0 1000 Z" fill="#d9c7b0" opacity="0.55"/>
  <g filter="url(#soft-shadow)">
    <rect x="180" y="145" width="1240" height="720" rx="28" fill="#1b211e"/>
    <rect x="220" y="198" width="1160" height="610" rx="18" fill="url(#screen)"/>
    <circle cx="250" cy="172" r="10" fill="#d9853b"/>
    <circle cx="282" cy="172" r="10" fill="#d8b05f"/>
    <circle cx="314" cy="172" r="10" fill="#4b958d"/>
  </g>
  <g transform="translate(280 250)">
    <rect width="430" height="500" rx="18" fill="url(#paper)" stroke="#c8b69e" stroke-width="2"/>
    <text x="34" y="60" fill="#28302b" font-family="Aptos, Segoe UI, sans-serif" font-size="34" font-weight="700">Handoff Packet</text>
    <rect x="34" y="94" width="180" height="12" rx="6" fill="#d9853b"/>
    <text x="34" y="150" fill="#4f5b52" font-family="Aptos, Segoe UI, sans-serif" font-size="24">Goal</text>
    <rect x="34" y="174" width="350" height="12" rx="6" fill="#b8aa98"/>
    <rect x="34" y="200" width="280" height="12" rx="6" fill="#cbbdaa"/>
    <text x="34" y="270" fill="#4f5b52" font-family="Aptos, Segoe UI, sans-serif" font-size="24">Current State</text>
    <rect x="34" y="294" width="320" height="12" rx="6" fill="#b8aa98"/>
    <rect x="34" y="320" width="240" height="12" rx="6" fill="#cbbdaa"/>
    <text x="34" y="390" fill="#4f5b52" font-family="Aptos, Segoe UI, sans-serif" font-size="24">Remaining Plan</text>
    <rect x="34" y="414" width="360" height="12" rx="6" fill="#b8aa98"/>
    <rect x="34" y="440" width="300" height="12" rx="6" fill="#cbbdaa"/>
  </g>
  <g transform="translate(780 258)">
    <rect width="440" height="126" rx="14" fill="#2f4039" stroke="#4b958d" stroke-width="2"/>
    <text x="28" y="48" fill="#f4ecdf" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">1. Verify state</text>
    <text x="28" y="90" fill="#b8cbc5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">Done when evidence is linked</text>
    <rect x="0" y="166" width="440" height="126" rx="14" fill="#273630" stroke="#d9853b" stroke-width="2"/>
    <text x="28" y="214" fill="#f4ecdf" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">2. Continue plan</text>
    <text x="28" y="256" fill="#d9c7b0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">Next action is explicit</text>
    <rect x="0" y="332" width="440" height="126" rx="14" fill="#24322d" stroke="#8da39b" stroke-width="2"/>
    <text x="28" y="380" fill="#f4ecdf" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">3. Resume prompt</text>
    <text x="28" y="422" fill="#b8cbc5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">Ready for a fresh agent</text>
  </g>
  <path d="M706 500 C742 484 764 458 780 410" fill="none" stroke="#d9853b" stroke-width="5" stroke-linecap="round"/>
  <path d="M706 590 C748 604 768 630 780 690" fill="none" stroke="#4b958d" stroke-width="5" stroke-linecap="round"/>
</svg>
